services:
  rdb:
    image: mysql:latest
    container_name: mysqldb
    restart: always
    environment:
      MYSQL_DATABASE: funchat
      MYSQL_ROOT_PASSWORD: ${ROOT_PW}
      MYSQL_USER: ${USER_ID}
      MYSQL_PASSWORD: ${USER_PW}
    ports:
      - '3306:3306'
  mongo:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: funchat
      MONGO_INITDB_ROOT_USERNAME: ${USER_ID}
      MONGO_INITDB_ROOT_PASSWORD: ${USER_PW}
    ports:
      - '27017:27017'
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - '6379:6379' # 로컬 호스트에서 Redis 접속 가능
    command: redis-server --appendonly yes # AOF 모드 활성화
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    ports:
      - '5540:5540'
