server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $backend_upstream app:8080;

    error_page 500 502 503 504 = @json_error;

    # 1. 프론트엔드 정적 파일 서빙
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # SPA 라우팅 대응
    }

    # 2. 백엔드 프록시 설정
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. 웹소켓 프록시 (채팅 기능용)
    location /ws/ {
        proxy_pass http://$backend_upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # JSON 에러 응답 처리
    location @json_error {
        default_type application/json;
        # 백엔드 서버가 죽었을 때(upstream connect refused) 502 응답과 함께 JSON 반환
        return 502 '{"status": 502, "message": "Backend server is temporarily unavailable (Bad Gateway).", "body": null}';
    }

    # 정적 에셋 캐싱
    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
