services:
  rdb:
    image: mysql:latest
    container_name: funchat-local-mysqldb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: funchat
      MYSQL_ROOT_PASSWORD: ${ROOT_PW}
      MYSQL_USER: ${USER_ID}
      MYSQL_PASSWORD: ${USER_PW}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - funchat_local_net

  mongo:
    image: mongo:latest
    container_name: funchat-local-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: funchat
      MONGO_INITDB_ROOT_USERNAME: ${USER_ID}
      MONGO_INITDB_ROOT_PASSWORD: ${USER_PW}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - funchat_local_net

  redis:
    image: redis:latest
    container_name: funchat-local-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - funchat_local_net

  app:
    build:
      context: ../backend
    container_name: funchat-local-app
    restart: unless-stopped
    depends_on:
      - rdb
      - mongo
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://rdb:3306/funchat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATA_REDIS_HOST: redis
      SPRING_MONGODB_HOST: mongo
      USER_ID: ${USER_ID}
      USER_PW: ${USER_PW}
      ROOT_PW: ${ROOT_PW}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_EXPIRATION: ${ACCESS_EXPIRATION}
      REFRESH_EXPIRATION: ${REFRESH_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - '8080:8080'
    networks:
      funchat_local_net:
        aliases:
          - funchat_local_app

  web:
    build:
      context: ../frontend/funchat
    container_name: funchat-local-web
    restart: unless-stopped
    depends_on:
      - app
    networks:
      funchat_local_net:
        aliases:
          - funchat_local_web

  router:
    image: nginx:alpine
    container_name: funchat-local-router
    restart: unless-stopped
    depends_on:
      - web
      - app
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/upstream.local.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - funchat_local_net

networks:
  funchat_local_net:

volumes:
  mysql_data:
  mongo_data:
  redis_data:
