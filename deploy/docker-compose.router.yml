services:
  router:
    image: nginx:alpine
    container_name: funchat-router
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      # deploy.sh가 롤링 배포 슬롯 상태에 맞춰 server 목록만 갱신하고 Nginx reload로 반영함
      - ./nginx/upstream.web.servers.conf:/etc/nginx/conf.d/upstream.web.servers.conf:ro
      - ./nginx/upstream.app.servers.conf:/etc/nginx/conf.d/upstream.app.servers.conf:ro
    networks:
      - funchat_net

networks:
  funchat_net:
    external: true
