services:
  router:
    image: nginx:alpine
    container_name: funchat-router
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Jenkins가 이 파일을 blue/green으로 교체함
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - funchat_net

networks:
  funchat_net:
    external: true
