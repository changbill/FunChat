name: funchat

services:
  rdb:
    image: mysql:latest
    container_name: funchat-mysqldb
    restart: always
    environment:
      MYSQL_DATABASE: funchat
      MYSQL_ROOT_PASSWORD: ${ROOT_PW}
      MYSQL_USER: ${USER_ID}
      MYSQL_PASSWORD: ${USER_PW}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - funchat_net

  mongo:
    image: mongo:latest
    container_name: funchat-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: funchat
      MONGO_INITDB_ROOT_USERNAME: ${USER_ID}
      MONGO_INITDB_ROOT_PASSWORD: ${USER_PW}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - funchat_net

  redis:
    image: redis:latest
    container_name: funchat-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - funchat_net

networks:
  funchat_net:
    name: funchat_net

volumes:
  mysql_data:
  mongo_data:
  redis_data:
