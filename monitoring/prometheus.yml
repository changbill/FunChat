global:
  scrape_interval: 5s # 테스트 중이므로 빠르게 수집 (기본 15s)

scrape_configs:
  # 1. 프로메테우스 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # 2. 배포된 스프링 부트 앱 인스턴스별 모니터링
  # 존재하지 않거나 실행 중이 아닌 슬롯은 Prometheus targets 화면에서 down으로 보일 수 있다.
  - job_name: 'spring-boot-apps'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'funchat-app-1:8081'
          - 'funchat-app-2:8081'
          - 'funchat-app-3:8081'
          - 'funchat-app-4:8081'

  # 3. MySQL 모니터링
  - job_name: 'mysql'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['funchat-mysql-exporter:9104']
